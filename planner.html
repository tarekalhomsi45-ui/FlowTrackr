<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrackr | AI Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo-area"><h1>FlowTrackr</h1></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="planner.html" class="nav-item active"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Planner</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </nav>
    <main>
        <h2>AI Planner</h2>
        <div class="quote-banner" style="margin-top: 20px;">
            <i class="fa-solid fa-robot" style="margin-right:15px; color:var(--accent-purple)"></i>
            <p>Tell me what you need to get done, and I'll build your schedule.</p>
        </div>
        <textarea class="auth-input" style="height: 150px; padding: 20px;" placeholder="Ex: I have a chemistry test on Friday and need to study the periodic table..."></textarea>
        <button class="auth-btn" style="width: auto; padding: 12px 30px;">Generate Plan ✨</button>
    </main>
</body>
</html>
