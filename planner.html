<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlowTrackr | AI Planner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --sidebar-bg: #111111;
            --accent-purple: #9d7cff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --ai-gradient: linear-gradient(135deg, #2a1b52 0%, #111 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        nav { width: 280px; background-color: var(--sidebar-bg); padding: 2.5rem 1.2rem; border-right: 1px solid #222; position: sticky; top: 0; height: 100vh; }
        .nav-item { display: flex; align-items: center; padding: 14px 18px; border-radius: 14px; color: var(--text-dim); text-decoration: none; font-weight: 500; margin-bottom: 6px; }
        .nav-item.active { background-color: #f5f3ff; color: #7c3aed; font-weight: 700; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* Planner Content */
        main { flex: 1; padding: 4rem 5rem; max-width: 900px; }
        .ai-card { 
            background: var(--ai-gradient); 
            border: 1px solid #3d2b5d; 
            padding: 40px; 
            border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(157, 124, 255, 0.15);
            color: var(--accent-purple);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 25px;
            border: 1px solid rgba(157, 124, 255, 0.3);
        }

        #plan-result {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ececec;
            min-height: 120px;
        }

        .generate-btn {
            margin-top: 35px;
            background: var(--accent-purple);
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .generate-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(157, 124, 255, 0.4); }
        .generate-btn:active { transform: translateY(0); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area" style="margin-bottom: 2.5rem; padding-left: 10px;">
            <h1 style="font-size: 1.8rem; font-weight: 900; letter-spacing: -1px;">FlowTrackr</h1>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="planner.html" class="nav-item active"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Planner</a>
            <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-ul"></i> Tasks</a>
            <a href="homework.html" class="nav-item"><i class="fa-solid fa-book-bookmark"></i> Homework</a>
        </div>
    </nav>

    <main>
        <div class="ai-card">
            <div class="status-badge">
                <i class="fa-solid fa-bolt-lightning"></i> DEEPSEEK BRAIN ONLINE
            </div>
            <h2 style="font-size: 2.2rem; margin-bottom: 20px; font-weight: 800;">Your Daily Strategy</h2>
            
            <div id="plan-result">
                Ready to optimize your day. Click below to analyze your current workload.
            </div>

            <button id="magic-btn" onclick="runAIPlanner()" class="generate-btn">
                <i class="fa-solid fa-sparkles"></i> Generate New Plan
            </button>
        </div>
    </main>

    <script>
        const DEEPSEEK_KEY = "sk-e3b5eb385aba49b9a4b1105e7f931893"; 

        async function runAIPlanner() {
            const btn = document.getElementById('magic-btn');
            const output = document.getElementById('plan-result');
            
            btn.disabled = true;
            output.innerHTML = `<i class="fa-solid fa-circle-notch loader"></i> Thinking about your Chemistry and Arabic goals...`;

            // Mocking the context—later we can make this pull from your actual Task list
            const userContext = "Active Homework: Chemistry Worksheet (Overdue), Arabic Grammar Outline. Skills: 3D Modeling (Blender). Goal: Maximize points.";

            try {
                const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${DEEPSEEK_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {
                                role: "system", 
                                content: "You are an elite academic performance coach. Provide a concise, high-impact study plan for a high school student. Focus on tackling overdue work first, then moving to high-point tasks. Keep it under 60 words."
                            },
                            {
                                role: "user", 
                                content: `Plan my day: ${userContext}`
                            }
                        ]
                    })
                });

                const data = await response.json();
                output.innerText = data.choices[0].message.content;

            } catch (error) {
                output.innerHTML = `<span style="color: #ff4d6d;">Error: Connection failed. Check your API balance or network!</span>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
