<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTrackr | Stay in the Zone</title>
    <style>
        /* This is the CSS to make it look pretty */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h1 { color: #2d3436; margin-bottom: 0.5rem; }
        p { color: #636e72; margin-bottom: 2rem; }
        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            color: #0984e3;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #00b894;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #009475; }
    </style>
</head>
<body>

    <div class="container">
        <h1>FlowTrackr</h1>
        <p>Your focus partner</p>
        
        <div class="timer-display" id="timer">25:00</div>
        
        <button class="btn" onclick="startTimer()">Start Flow</button>
    </div>

    <script>
        // This is the JavaScript to make the timer work
        function startTimer() {
            let timeLeft = 25 * 60;
            const display = document.getElementById('timer');
            
            const countdown = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                
                seconds = seconds < 10 ? '0' + seconds : seconds;
                display.innerHTML = `${minutes}:${seconds}`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("Flow session complete! Take a break.");
                }
                timeLeft--;
            }, 1000);
        }
    </script>

</body>
</html>
