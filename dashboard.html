<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTrackr | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --sidebar-bg: #111111;
            --accent-purple: #9d7cff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --active-bg: #f5f3ff;
            --active-text: #7c3aed;
            --card-red: linear-gradient(145deg, #2a1a24 0%, #161616 100%);
            --card-orange: linear-gradient(145deg, #2a2216 0%, #161616 100%);
            --banner-purple: linear-gradient(to right, rgba(88, 28, 135, 0.4), rgba(112, 26, 117, 0.4));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        nav { width: 280px; background-color: var(--sidebar-bg); padding: 2.5rem 1.2rem; height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; border-right: 1px solid #222; }
        .logo-area h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 2.5rem; padding-left: 10px; }
        .nav-item { display: flex; align-items: center; padding: 14px 18px; border-radius: 14px; color: var(--text-dim); text-decoration: none; font-weight: 500; margin-bottom: 6px; }
        .nav-item.active { background-color: var(--active-bg); color: var(--active-text); font-weight: 700; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* --- MAIN CONTENT --- */
        main { flex: 1; padding: 4rem 5rem; max-width: 1400px; }
        .greeting-title { font-size: 3rem; font-weight: 700; margin-bottom: 0.5rem; }
        .sub-text { color: var(--text-dim); margin-bottom: 2.5rem; }

        /* Motivation Banner (From Base44) */
        .quote-banner {
            background: var(--banner-purple);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 2.5rem;
        }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 3rem; }
        .stat-card { padding: 3rem 2.5rem; border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card.tasks { background: var(--card-red); border-color: #3d2434; }
        .stat-card.homework { background: var(--card-orange); border-color: #3d301d; }
        .stat-card .count { font-size: 4.5rem; font-weight: 800; display: block; line-height: 1; margin-bottom: 10px; }

        /* Weekly Progress (From Base44) */
        .progress-section { background: #1a1a1a; padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 2.5rem; }
        .days-row { display: flex; justify-content: space-between; margin-top: 20px; }
        .day-dot { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .dot-circle { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
        .dot-circle.today { border-color: var(--accent-purple); background: rgba(157, 124, 255, 0.1); color: var(--accent-purple); }

        /* Goals (From Base44) */
        .goals-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .goal-item { background: #1a1a1a; padding: 15px; border-radius: 18px; border: 1px solid #333; }
        .goal-input { background: transparent; border: none; color: white; width: 100%; font-size: 14px; outline: none; margin-top: 5px; }
        .goal-input::placeholder { color: #555; font-style: italic; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-area"><h1>FlowTrackr</h1></div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-ul"></i> Tasks</a>
            <a href="homework.html" class="nav-item"><i class="fa-solid fa-book-bookmark"></i> Homework</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </nav>

    <main>
        <h2 class="greeting-title" id="greet">Good morning 👋</h2>
        <p class="sub-text">Ready to crush your goals?</p>

        <div class="quote-banner">
            <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent-purple);"></i>
            <p id="motivation-quote" style="color: #e0d5ff; font-style: italic;"></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card tasks">
                <i class="fa-solid fa-list-check" style="color: #ff4d6d; font-size: 1.5rem; margin-bottom: 1rem; display: block;"></i>
                <span class="count">0</span>
                <span class="label" style="color: var(--text-dim)">Tasks Remaining</span>
            </div>
            <div class="stat-card homework">
                <i class="fa-solid fa-book" style="color: #ffb703; font-size: 1.5rem; margin-bottom: 1rem; display: block;"></i>
                <span class="count">0</span>
                <span class="label" style="color: var(--text-dim)">Homework Due</span>
            </div>
        </div>

        <div class="progress-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 14px; font-weight: 600;">Weekly Progress</h3>
                <span style="font-size: 12px; color: var(--accent-purple);" id="completion-pct">0% done</span>
            </div>
            <div class="days-row" id="days-container"></div>
        </div>

        <h3 style="margin-bottom: 1rem; font-size: 1.2rem;">My Goals</h3>
        <div class="goals-grid">
            <div class="goal-item">
                <span style="font-size: 10px; color: #666; font-weight: 800;">WEEKLY GOAL</span>
                <input type="text" class="goal-input" placeholder="e.g. Finish all chem homework" id="weekly-goal">
            </div>
            <div class="goal-item">
                <span style="font-size: 10px; color: #666; font-weight: 800;">MONTHLY GOAL</span>
                <input type="text" class="goal-input" placeholder="e.g. Straight A's" id="monthly-goal">
            </div>
            <div class="goal-item">
                <span style="font-size: 10px; color: #666; font-weight: 800;">YEARLY GOAL</span>
                <input type="text" class="goal-input" placeholder="e.g. Make honor roll" id="yearly-goal">
            </div>
        </div>
    </main>

    <script>
        // 1. Personalized Greeting
        const name = localStorage.getItem('userName') || "User";
        document.getElementById('greet').innerText = `Good morning, ${name} 👋`;

        // 2. Motivation Quotes Logic (Translated from your React code)
        const QUOTES = [
            "Success is built on daily habits, not once-in-a-lifetime effort.",
            "Small steps every day lead to big results. Keep going!",
            "Consistency beats motivation every single time.",
            "Hard work now = freedom later. Stay focused!",
            "One task at a time. You've got this."
        ];
        const dayIndex = new Date().getDate() % QUOTES.length;
        document.getElementById('motivation-quote').innerText = QUOTES[dayIndex];

        // 3. Weekly Progress Logic
        const daysContainer = document.getElementById('days-container');
        const dayNames = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
        const today = new Date().getDay(); // 1 = Monday, etc.
        const adjustedToday = today === 0 ? 6 : today - 1; // Adjust for Monday start

        dayNames.forEach((name, i) => {
            const isToday = i === adjustedToday;
            daysContainer.innerHTML += `
                <div class="day-dot">
                    <span style="font-size: 10px; color: ${isToday ? '#9d7cff' : '#666'}">${name}</span>
                    <div class="dot-circle ${isToday ? 'today' : ''}">${i + 23}</div>
                </div>
            `;
        });

        // 4. Save Goals to LocalStorage (So they don't disappear)
        const goalIds = ['weekly-goal', 'monthly-goal', 'yearly-goal'];
        goalIds.forEach(id => {
            const saved = localStorage.getItem(id);
            if (saved) document.getElementById(id).value = saved;
            
            document.getElementById(id).addEventListener('input', (e) => {
                localStorage.setItem(id, e.target.value);
            });
        });
    </script>
</body>
</html>
